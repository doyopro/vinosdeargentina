<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperAdmin - De Altura Wines</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* MANTENEMOS TUS ESTILOS ORIGINALES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #360914 0%, #54101d 100%);
            min-height: 100vh;
            color: #333;
        }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .admin-header,
        .stat-card,
        .orders-section {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-header h1 {
            color: #360914;
            font-size: 2em;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-label {
            color: #999;
            font-size: 0.85em;
            text-transform: uppercase;
            font-weight: 600;
        }

        .stat-value {
            color: #360914;
            font-size: 2.2em;
            font-weight: 700;
        }

        .orders-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .orders-table th,
        .orders-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
        }

        .status-paid {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status-pending {
            background: #fff3e0;
            color: #e65100;
        }

        /* NUEVOS ESTILOS PARA PESTAÑAS E INVENTARIO */
        .tab-container {
            display: flex;
            gap: 10px;
        }

        .tab-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #eee;
            font-weight: 600;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: #C89F5D;
            color: white;
        }

        .inventory-input {
            width: 70px;
            padding: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            text-align: center;
        }

        .save-btn {
            background: #360914;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
        }

        .logout-btn {
            background: #d32f2f;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="admin-container">
        <div class="admin-header">
            <div>
                <h1>📊 SuperAdmin Dashboard</h1>
                <p style="color: #666;">Control total de Ventas e Inventario</p>
            </div>
            <div class="tab-container">
                <button class="tab-btn active" onclick="switchTab('orders')">📦 Órdenes</button>
                <button class="tab-btn" onclick="switchTab('inventory')">🍷 Stock y Márgenes</button>
            </div>
            <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
        </div>

        <div class="dashboard-grid">
            <div class="stat-card">
                <div class="stat-label">Ingresos Totales</div>
                <div class="stat-value" id="total-revenue">0.00 €</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Ventas Pagadas</div>
                <div class="stat-value" id="paid-orders">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Stock Alerta (Bajo)</div>
                <div class="stat-value" id="stock-alert" style="color: #d32f2f;">0</div>
            </div>
        </div>

        <div id="section-orders" class="orders-section">
            <h2>Historial de Órdenes Reales</h2>
            <div id="orders-container">
                <p style="padding: 20px; color: #999;">Cargando datos de Supabase...</p>
            </div>
        </div>

        <div id="section-inventory" class="orders-section" style="display: none;">
            <h2>Inventario y Rentabilidad (Tarifas 2026)</h2>
            <div id="inventory-container"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://pzzbvinbyzaxrshlmlcn.supabase.co';
        const SUPABASE_ANON_KEY = 'TU_KEY_AQUI'; // USA TU KEY ORIGINAL
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let allOrders = [];

        async function init() {
            await loadOrders();
            await checkStockAlerts();
        }

        async function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            if (tab === 'orders') {
                document.getElementById('section-orders').style.display = 'block';
                document.getElementById('section-inventory').style.display = 'none';
                loadOrders();
            } else {
                document.getElementById('section-orders').style.display = 'none';
                document.getElementById('section-inventory').style.display = 'block';
                loadInventory();
            }
        }

        // --- LÓGICA DE ÓRDENES (RECUPERADA Y MEJORADA) ---
        async function loadOrders() {
            const { data: orders, error } = await supabase
                .from('orders')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) return console.error(error);
            allOrders = orders;

            calculateStats();
            renderOrdersTable();
        }

        function calculateStats() {
            const totalRevenue = allOrders
                .filter(o => o.payment_status === 'paid')
                .reduce((sum, o) => sum + (parseFloat(o.total_amount) || 0), 0);

            const paidCount = allOrders.filter(o => o.payment_status === 'paid').length;

            document.getElementById('total-revenue').textContent = totalRevenue.toFixed(2) + ' €';
            document.getElementById('paid-orders').textContent = paidCount;
        }

        function renderOrdersTable() {
            const container = document.getElementById('orders-container');
            if (allOrders.length === 0) {
                container.innerHTML = '<p>No hay órdenes registradas.</p>';
                return;
            }

            let html = `<table class="orders-table">
                <thead><tr><th>ID</th><th>Cliente</th><th>Total</th><th>Estado</th><th>Fecha</th></tr></thead><tbody>`;

            allOrders.forEach(o => {
                html += `<tr>
                    <td>#${o.id.slice(0, 5)}</td>
                    <td>${o.customer_name}<br><small>${o.customer_email}</small></td>
                    <td><strong>${parseFloat(o.total_amount).toFixed(2)} €</strong></td>
                    <td><span class="status-badge status-${o.payment_status}">${o.payment_status}</span></td>
                    <td>${new Date(o.created_at).toLocaleDateString()}</td>
                </tr>`;
            });
            container.innerHTML = html + '</tbody></table>';
        }

        // --- LÓGICA DE INVENTARIO (NUEVA) ---
        async function loadInventory() {
            const { data: wines } = await supabase.from('wines').select('*').order('name');
            const container = document.getElementById('inventory-container');

            let html = `<table class="orders-table">
                <thead><tr><th>Vino</th><th>Región</th><th>Venta Botella</th><th>Margen Unit.</th><th>Stock (Cajas)</th><th>Acción</th></tr></thead><tbody>`;

            wines.forEach(w => {
                const margin = (w.price_retail - (w.price_horeca || 0)).toFixed(2);
                html += `<tr>
                    <td>${w.name}</td>
                    <td>${w.region}</td>
                    <td>${w.price_retail} €</td>
                    <td style="color: green; font-weight: 600;">+${margin} €</td>
                    <td><input type="number" class="inventory-input" id="stock-${w.id}" value="${w.stock || 0}"></td>
                    <td><button class="save-btn" onclick="updateStock('${w.id}')">Guardar</button></td>
                </tr>`;
            });
            container.innerHTML = html + '</tbody></table>';
        }

        async function updateStock(id) {
            const newStock = document.getElementById(`stock-${id}`).value;
            const { error } = await supabase.from('wines').update({ stock: newStock }).eq('id', id);
            if (error) alert('Error al actualizar');
            else {
                alert('Stock actualizado ✅');
                checkStockAlerts();
            }
        }

        async function checkStockAlerts() {
            const { data } = await supabase.from('wines').select('stock').lt('stock', 5);
            document.getElementById('stock-alert').textContent = data ? data.length : 0;
        }

        function logout() {
            window.location.href = 'index.html';
        }

        init();
    </script>
</body>

</html>
